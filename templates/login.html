<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Information System - IIT Dholakpur</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #222327;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 90%;
        max-width: 1300px;
        padding: 30px 0;
        margin-bottom: 20px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
        text-decoration: none;
        color: inherit;
      }
      .logo {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        object-fit: cover;
      }
      .institute-name {
        color: #8ab4f8;
        font-size: 22px;
        font-weight: 600;
        margin: 0;
      }
      .header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }
      .system-name {
        color: #8ab4f8;
        font-size: 22px;
        font-weight: 600;
        margin: 0;
      }
      .header-link {
        color: #bdc1c6;
        text-decoration: none;
        font-size: 14px;
        margin-top: 8px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .header-link:hover {
        color: #8ab4f8;
        text-decoration: underline;
      }
      .main-content {
        display: flex;
        width: 90%;
        max-width: 1300px;
        gap: 40px;
        justify-content: space-between;
        align-items: flex-start;
      }
      .image-section {
        flex: 1.2;
        border-radius: 4px;
        overflow: hidden;
      }
      .image-section img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }
      .login-section {
        flex: 1;
        background-color: #2a2c31;
        border: 1px solid #3c4043;
        border-radius: 4px;
        padding: 50px;
        box-sizing: border-box;
        min-width: 450px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .login-section p {
        font-size: 15px;
        margin-top: 0;
        margin-bottom: 40px;
        color: #e8eaed;
      }
      .form-group {
        margin-bottom: 25px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
        color: #e8eaed;
      }
      .form-group label span {
        color: #f28b82;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        background-color: #1e1f22;
        border: 1px solid #5f6368;
        border-radius: 4px;
        color: #fff;
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        font-size: 15px;
      }
      .form-group input[type="password"] {
        background-color: #7b7115;
        color: #fff;
        border: 1px solid #5f6368;
        letter-spacing: 2px;
      }
      .form-group input:focus {
        outline: none;
        border-color: #8ab4f8;
      }
      .login-btn {
        background-color: #29408b;
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 4px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
        font-family: "Inter", sans-serif;
      }
      .login-btn:hover {
        background-color: #1e306b;
      }
      .forgot-password {
        display: block;
        color: #e8eaed;
        text-decoration: underline;
        font-size: 13px;
      }
      .error {
        color: #f28b82;
        margin-top: 20px;
        font-size: 14px;
        background: rgba(242, 139, 130, 0.1);
        padding: 10px;
        border-radius: 4px;
      }
      .success-msg {
        color: #81c995;
        margin-top: 20px;
        font-size: 14px;
        background: rgba(129, 201, 149, 0.1);
        padding: 10px;
        border-radius: 4px;
        text-align: center;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/" class="header-left">
        <img
          src="{{ url_for('static', filename='logo.png') }}"
          alt="IIT Dholakpur Logo"
          class="logo"
        />
        <h1 class="institute-name">Indian Institute of Technology Dholakpur</h1>
      </a>
      <div class="header-right">
        <h2 class="system-name">Academic Information System</h2>
        <a href="/feedback" class="header-link">Tech Support & Feedback</a>
      </div>
    </div>

    <div class="main-content">
      <div class="image-section">
        <img
          src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
          alt="Campus Building"
        />
      </div>

      <div class="login-section">
        <p>Login with credentials of AIS portal.</p>

        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST">
          <div class="form-group">
            <label>Username<span>*</span></label>
            <input
              type="text"
              name="username"
              placeholder="Enter Username"
              required
            />
          </div>
          <div class="form-group">
            <label>Password<span>*</span></label>
            <input
              type="password"
              name="password"
              placeholder="Enter Password"
              required
            />
          </div>
          <button type="submit" class="login-btn">Login</button>

          <div
            style="
              margin-top: 20px;
              display: flex;
              justify-content: space-between;
            "
          >
            <a href="/register" class="forgot-password">Register New Account</a>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
