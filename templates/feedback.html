<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Support - IIT Dholakpur</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #222327;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 90%;
        max-width: 1300px;
        padding: 30px 0;
        margin-bottom: 20px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
        text-decoration: none;
        color: inherit;
      }
      .logo {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        object-fit: cover;
      }
      .institute-name {
        color: #8ab4f8;
        font-size: 22px;
        font-weight: 600;
        margin: 0;
      }
      .system-name {
        color: #8ab4f8;
        font-size: 22px;
        font-weight: 600;
        margin: 0;
        text-align: right;
      }
      .main-content {
        display: flex;
        width: 90%;
        max-width: 1300px;
        gap: 40px;
        justify-content: center;
        align-items: flex-start;
      }
      .feedback-section {
        flex: 1;
        max-width: 600px;
        background-color: #2a2c31;
        border: 1px solid #3c4043;
        border-radius: 4px;
        padding: 50px;
        box-sizing: border-box;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .feedback-section h2 {
        color: #8ab4f8;
        margin-top: 0;
        margin-bottom: 10px;
      }
      .feedback-section p {
        font-size: 15px;
        margin-top: 0;
        margin-bottom: 40px;
        color: #e8eaed;
      }
      .form-group {
        margin-bottom: 25px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
        color: #e8eaed;
      }
      .form-group label span {
        color: #f28b82;
      }
      .form-group textarea {
        width: 100%;
        padding: 12px;
        background-color: #1e1f22;
        border: 1px solid #5f6368;
        border-radius: 4px;
        color: #fff;
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        font-size: 15px;
        resize: vertical;
        min-height: 150px;
      }
      .form-group textarea:focus {
        outline: none;
        border-color: #8ab4f8;
      }
      .submit-btn {
        background-color: #29408b;
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 4px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
        font-family: "Inter", sans-serif;
        width: 100%;
      }
      .submit-btn:hover {
        background-color: #1e306b;
      }
      .success-msg {
        color: #81c995;
        margin-top: 20px;
        font-size: 14px;
        background: rgba(129, 201, 149, 0.1);
        padding: 15px;
        border-radius: 4px;
        text-align: center;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #8ab4f8;
        text-decoration: none;
        font-size: 14px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/" class="header-left">
        <img
          src="{{ url_for('static', filename='logo.png') }}"
          alt="IIT Dholakpur Logo"
          class="logo"
        />
        <h1 class="institute-name">Indian Institute of Technology Dholakpur</h1>
      </a>
      <h2 class="system-name">Academic Information System</h2>
    </div>

    <div class="main-content">
      <div class="feedback-section">
        <h2>Tech Support</h2>
        <p>
          Experiencing issues with the AIS portal? Send a message to the admin
          team.
        </p>

        {% if success %}
        <div class="success-msg">
          Your message has been sent to the administrators successfully.
        </div>
        <a href="/" class="back-link">Return to Home</a>
        {% else %}
        <form method="POST">
          <div class="form-group">
            <label>Message Content<span>*</span></label>
            <textarea
              name="content"
              placeholder="Describe your issue here..."
              required
            ></textarea>
          </div>
          <button type="submit" class="submit-btn">Submit Ticket</button>
        </form>
        <a href="/" class="back-link">Cancel</a>
        {% endif %}
      </div>
    </div>
  </body>
</html>
